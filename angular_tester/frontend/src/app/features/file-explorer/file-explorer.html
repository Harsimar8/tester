<div style="display:flex; height:100vh;">

  <div style="width:30%; border-right:1px solid #ddd;">
    <div *ngFor="let file of htmlFiles"
         (click)="openFile(file)"
         style="padding:10px; cursor:pointer;">
      {{ file.name }}
    </div>
  </div>

  <div style="width:70%;">
    <app-live-preview></app-live-preview>
  </div>

</div>
